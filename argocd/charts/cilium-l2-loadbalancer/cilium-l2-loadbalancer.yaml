apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: home-lan-pool
spec:
  blocks:
    - start: 192.168.1.80
      stop: 192.168.1.90
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: home-lan-l2-policy
spec:
  loadBalancerIPs: true
  serviceSelector: {}
  nodeSelector: {}
