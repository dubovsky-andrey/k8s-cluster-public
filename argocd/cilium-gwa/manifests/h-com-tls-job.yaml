apiVersion: v1
kind: ServiceAccount
metadata:
  name: h-com-tls-writer
  namespace: gatewayapi
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: h-com-tls-writer
  namespace: gatewayapi
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: h-com-tls-writer
  namespace: gatewayapi
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: h-com-tls-writer
    namespace: gatewayapi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: h-com-tls-writer
---
apiVersion: batch/v1
kind: Job
metadata:
  name: h-com-tls
  namespace: gatewayapi
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: h-com-tls-writer
      containers:
        - name: create-secret
          image: alpine/k8s:1.34.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              openssl req -x509 -nodes -days 365 \
                -newkey rsa:2048 \
                -keyout /tmp/h-com.key \
                -out /tmp/h-com.crt \
                -subj "/CN=*.h.com" \
                -addext "subjectAltName=DNS:*.h.com,DNS:h.com"

              kubectl create secret tls h-com-tls \
                --namespace gatewayapi \
                --cert /tmp/h-com.crt \
                --key /tmp/h-com.key \
                --dry-run=client \
                -o yaml | kubectl apply -f -
