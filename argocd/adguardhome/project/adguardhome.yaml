apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: adguardhome
  namespace: argocd
spec:
  description: adguardhome project
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  sourceRepos:
    - https://github.com/dubovsky-andrey/k8s-cluster-public.git

  destinations:
    - namespace: adguardhome
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'