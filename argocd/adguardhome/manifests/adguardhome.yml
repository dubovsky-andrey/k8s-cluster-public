# PersistentVolume
apiVersion: v1
kind: PersistentVolume
metadata:
  name: adguardhome-pv
  labels:
    type: nfs
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage
  nfs:
    path: /volume1/nfs/k8s-data/adguardhome 
    server: 192.168.1.20
---
# PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguardhome-pvc
  namespace: adguardhome
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: nfs-storage
  volumeName: adguardhome-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguardhome
  namespace: adguardhome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguardhome
  template:
    metadata:
      labels:
        app: adguardhome
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: adguardhome
          image: adguard/adguardhome:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: dns-tcp
              containerPort: 53
              hostPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              hostPort: 53
              protocol: UDP
            - name: dhcp-udp
              containerPort: 67
              protocol: UDP
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https-tcp
              containerPort: 443
              protocol: TCP
            - name: https-udp
              containerPort: 443
              protocol: UDP
            - name: ui
              containerPort: 3000
              protocol: TCP
            - name: dns-over-tls
              containerPort: 853
              protocol: TCP
            - name: dns-quic
              containerPort: 784
              protocol: UDP
            - name: dns-over-udp
              containerPort: 853
              protocol: UDP
            - name: dns-alt-udp
              containerPort: 8853
              protocol: UDP
            - name: dns-alt-tcp
              containerPort: 5443
              protocol: TCP
            - name: dns-alt2-udp
              containerPort: 5443
              protocol: UDP
          volumeMounts:
            - name: adguard-storage
              mountPath: /opt/adguardhome/work
              subPath: work
            - name: adguard-storage
              mountPath: /opt/adguardhome/conf
              subPath: conf
          resources:
            requests:
              cpu: "2500m"
              memory: "3000Mi"
            limits:
              cpu: "2500m"
              memory: "3000Mi"
      volumes:
        - name: adguard-storage
          persistentVolumeClaim:
            claimName: adguardhome-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: adguardhome-service
  namespace: adguardhome
spec:
  selector:
    app: adguardhome
  ports:
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dhcp-udp
      port: 67
      targetPort: dhcp-udp
      protocol: UDP
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https-tcp
      port: 443
      targetPort: https-tcp
      protocol: TCP
    - name: https-udp
      port: 443
      targetPort: https-udp
      protocol: UDP
    - name: ui
      port: 3000
      targetPort: ui
      protocol: TCP
    - name: dns-over-tls
      port: 853
      targetPort: dns-over-tls
      protocol: TCP
    - name: dns-quic
      port: 784
      targetPort: dns-quic
      protocol: UDP
    - name: dns-over-udp
      port: 853
      targetPort: dns-over-udp
      protocol: UDP
    - name: dns-alt-udp
      port: 8853
      targetPort: dns-alt-udp
      protocol: UDP
    - name: dns-alt-tcp
      port: 5443
      targetPort: dns-alt-tcp
      protocol: TCP
    - name: dns-alt2-udp
      port: 5443
      targetPort: dns-alt2-udp
      protocol: UDP
  type: ClusterIP
