---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: homarr-database-pv
  labels:
    type: nfs
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage
  nfs:
    path: /volume1/nfs/k8s-data/homarr/appdata
    server: 192.168.1.20