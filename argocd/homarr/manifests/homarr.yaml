apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: homarr
  namespace: homarr
spec:
  replicas: 1
  serviceName: homarr
  selector:
    matchLabels:
      app.kubernetes.io/name: homarr
      app.kubernetes.io/part-of: homarr
      app.kubernetes.io/instance: n7
  revisionHistoryLimit: 15
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homarr
        app.kubernetes.io/part-of: homarr
        app.kubernetes.io/instance: n7
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
      - name: homarr
        image: ghcr.io/homarr-labs/homarr:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: SECRET_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: homarr-secret
              key: SECRET_ENCRYPTION_KEY
        ports:
        - name: http
          containerPort: 7575
        volumeMounts:
        - name: appdata
          mountPath: /appdata
        startupProbe:
          httpGet:
            path: /
            port: http
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: appdata
        persistentVolumeClaim:
          claimName: homarr-appdata
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homarr-appdata
  namespace: homarr
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: nfs-storage
  volumeName: homarr-pv-appdata
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: homarr-pv-appdata
  labels:
    type: nfs
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage
  nfs:
    path: /volume1/nfs/k8s-data/homarr/appdata
    server: 192.168.1.20
---
apiVersion: v1
kind: Service
metadata:
  name: homarr
  namespace: homarr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: homarr
  ports:
  - name: http
    port: 7575
    targetPort: http
