apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homarr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1060"
spec:
  description: Homarr dashboard

  sourceRepos:
    - https://github.com/dubovsky-andrey/k8s-cluster-public.git
    - https://homarr-labs.github.io/charts/

  destinations:
    - namespace: homarr
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
