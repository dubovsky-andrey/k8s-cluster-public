apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cilium-lb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1000"
spec:
  description: Cilium L2 load balancer resources

  sourceRepos:
    - https://github.com/dubovsky-andrey/k8s-cluster-public.git

  destinations:
    - namespace: kube-system
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
