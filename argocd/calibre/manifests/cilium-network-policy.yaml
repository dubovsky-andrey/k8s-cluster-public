apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: calibre-network-policy
  namespace: calibre
  labels:
    app.kubernetes.io/name: calibre
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: calibre
  ingress:
    # Allow HTTP traffic forwarded by the Cilium Gateway API datapath.
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8083"
              protocol: TCP
  egress:
    # Allow DNS resolution only.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
