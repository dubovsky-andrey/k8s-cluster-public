apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calibre-routes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2041"
spec:
  project: calibre
  source:
    repoURL: https://github.com/dubovsky-andrey/k8s-cluster-public.git
    path: argocd/calibre/manifests
    targetRevision: main
    directory:
      include: httproute.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: calibre
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
