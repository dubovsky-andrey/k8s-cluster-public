apiVersion: v1
kind: ServiceAccount
metadata:
  name: moodle-secret-writer
  namespace: moodle
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: moodle-secret-writer
  namespace: moodle
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: moodle-secret-writer
  namespace: moodle
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
subjects:
  - kind: ServiceAccount
    name: moodle-secret-writer
    namespace: moodle
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: moodle-secret-writer
---
apiVersion: batch/v1
kind: Job
metadata:
  name: moodle-secret-generator
  namespace: moodle
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: moodle-secret-writer
      containers:
        - name: create-secret
          image: bitnami/kubectl:1.34
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if kubectl -n moodle get secret moodle-credentials >/dev/null 2>&1; then
                echo "Secret moodle-credentials already exists; leaving values unchanged."
                exit 0
              fi

              db_password="$(head -c 32 /dev/urandom | base64 | tr -d '\n')"

              kubectl -n moodle create secret generic moodle-credentials \
                --from-literal=MARIADB_ROOT_PASSWORD="$(head -c 32 /dev/urandom | base64 | tr -d '\n')" \
                --from-literal=MARIADB_PASSWORD="$db_password" \
                --from-literal=MOODLE_DATABASE_PASSWORD="$db_password" \
                --from-literal=MOODLE_PASSWORD="$(head -c 32 /dev/urandom | base64 | tr -d '\n')"
