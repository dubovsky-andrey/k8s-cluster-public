apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: moodle
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1050"
spec:
  description: Moodle

  sourceRepos:
    - https://github.com/dubovsky-andrey/k8s-cluster-public.git

  destinations:
    - namespace: moodle
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
