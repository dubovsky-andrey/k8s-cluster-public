apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: moodle-routes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2051"
spec:
  project: moodle
  source:
    repoURL: https://github.com/dubovsky-andrey/k8s-cluster-public.git
    path: argocd/moodle/k8s-config
    targetRevision: main
    directory:
      include: httproute.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: moodle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
