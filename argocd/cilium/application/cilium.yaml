apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2001"
spec:
  project: cilium
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    targetRevision: 1.19.4
    helm:
      releaseName: cilium
      values: |
        kubeProxyReplacement: true
        gatewayAPI:
          enabled: true
          gatewayClass:
            create: false
        l2announcements:
          enabled: true
        externalIPs:
          enabled: true
        k8sClientRateLimit:
          qps: 50
          burst: 100
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
