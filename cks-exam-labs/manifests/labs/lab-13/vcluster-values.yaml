controlPlane:
  proxy:
    extraSANs:
      - lab-13
      - lab-13.cks-lab-13
      - lab-13.cks-lab-13.svc
      - lab-13.cks-lab-13.svc.cluster.local
  distro:
    k8s:
      enabled: true
      image:
        tag: v1.34.0
  statefulSet:
    persistence:
      volumeClaim:
        enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

exportKubeConfig:
  server: https://lab-13.cks-lab-13.svc.cluster.local:443

sync:
  toHost:
    pods:
      enabled: true
    services:
      enabled: true
    secrets:
      enabled: true
    configMaps:
      enabled: true
    persistentVolumeClaims:
      enabled: true
