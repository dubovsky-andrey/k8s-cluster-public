apiVersion: v1
kind: Namespace
metadata:
  name: automated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sweeper
  namespace: automated
  labels:
    app: sweeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sweeper
  template:
    metadata:
      labels:
        app: sweeper
    spec:
      containers:
        - name: sweeper
          image: busybox:1.36
          command:
            - sleep
            - "3600"
