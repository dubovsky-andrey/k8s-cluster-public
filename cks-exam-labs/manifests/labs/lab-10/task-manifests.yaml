apiVersion: v1
kind: Namespace
metadata:
  name: products
  labels:
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: database
  labels:
    environment: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    environment: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: products
  labels:
    app: web-app
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
        tier: frontend
    spec:
      containers:
        - name: web
          image: nginx:1.27
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: products
spec:
  selector:
    app: web-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-db
  namespace: database
  labels:
    app: database
    component: product-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
        component: product-db
    spec:
      containers:
        - name: db
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - sleep 365d
---
apiVersion: v1
kind: Service
metadata:
  name: product-db
  namespace: database
spec:
  selector:
    app: database
  ports:
    - name: tcp
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-worker
  namespace: payments
  labels:
    app: payment-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-worker
  template:
    metadata:
      labels:
        app: payment-worker
    spec:
      containers:
        - name: worker
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - sleep 365d
