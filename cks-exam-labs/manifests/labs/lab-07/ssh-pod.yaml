apiVersion: apps/v1
kind: Deployment
metadata:
  name: cks-shell
  labels:
    app.kubernetes.io/name: cks-shell
    app.kubernetes.io/part-of: cks-lab-07
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cks-shell
      app.kubernetes.io/part-of: cks-lab-07
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cks-shell
        app.kubernetes.io/part-of: cks-lab-07
    spec:
      serviceAccountName: cks-shell
      automountServiceAccountToken: false
      initContainers:
        - name: bootstrap-task
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - kubectl apply -f /opt/cks/task-manifests.yaml
          env:
            - name: KUBECONFIG
              value: /home/student/.kube/config
          volumeMounts:
            - name: vcluster-kubeconfig
              mountPath: /home/student/.kube/config
              subPath: config
              readOnly: true
            - name: task
              mountPath: /opt/cks/task-manifests.yaml
              subPath: task-manifests.yaml
              readOnly: true
      containers:
        - name: ssh
          image: ghcr.io/dubovsky-andrey/k8s-ubuntu-cks-lab-07:24.04
          imagePullPolicy: Always
          ports:
            - name: ssh
              containerPort: 22
          env:
            - name: CKS_LAB_NAME
              value: cks-lab-07
            - name: KUBECONFIG
              value: /home/student/.kube/config
          command:
            - /bin/sh
            - -ec
            - |
              install -d -m 700 -o student -g student /home/student/.ssh
              install -m 600 -o student -g student /run/cks/authorized_keys /home/student/.ssh/authorized_keys
              install -m 644 -o student -g student /run/cks/bashrc /home/student/.bashrc
              if ! getent group etcd >/dev/null 2>&1; then
                groupadd --system etcd
              fi
              if ! id etcd >/dev/null 2>&1; then
                useradd -s /usr/sbin/nologin --system -g etcd etcd
              fi
              install -d -m 755 -o root -g root /usr/lib/systemd/system /var/lib/kubelet /etc/kubernetes/manifests /opt/kube-bench/cfg /var/lib/etcd
              install -m 644 -o root -g root /opt/cks/lab-07/kubelet.service /usr/lib/systemd/system/kubelet.service
              install -m 644 -o root -g root /opt/cks/lab-07/kubelet-config.yaml /var/lib/kubelet/config.yaml
              install -m 644 -o root -g root /opt/cks/lab-07/kube-controller-manager.yaml /etc/kubernetes/manifests/kube-controller-manager.yaml
              install -m 644 -o root -g root /opt/cks/lab-07/kube-scheduler.yaml /etc/kubernetes/manifests/kube-scheduler.yaml
              chown -R root:root /var/lib/etcd
              install -m 555 -o student -g student /opt/cks/lab-07/val.sh /home/student/val.sh
              exec /usr/sbin/sshd -D -e
          volumeMounts:
            - name: authorized-keys
              mountPath: /run/cks/authorized_keys
              subPath: authorized_keys
              readOnly: true
            - name: shell-base
              mountPath: /run/cks/bashrc
              subPath: bashrc
              readOnly: true
            - name: vcluster-kubeconfig
              mountPath: /home/student/.kube/config
              subPath: config
              readOnly: true
            - name: task
              mountPath: /home/student/task.txt
              subPath: task.txt
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: authorized-keys
          secret:
            secretName: cks-shared-ssh-authorized-keys
        - name: shell-base
          configMap:
            name: cks-shell-base
        - name: vcluster-kubeconfig
          secret:
            secretName: vc-lab-07
        - name: task
          configMap:
            name: cks-lab-07-task
