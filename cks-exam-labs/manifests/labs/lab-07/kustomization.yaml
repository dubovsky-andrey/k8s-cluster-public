apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cks-lab-07
resources:
  - namespace.yaml
  - ssh-authorized-key-secret.yaml
  - ssh-shell-base.yaml
  - common-rbac.yaml
  - ssh-pod.yaml
  - ssh-service.yaml
configMapGenerator:
  - name: cks-lab-07-task
    files:
      - task.txt=task-description.md
      - task-manifests.yaml=task-manifests.yaml
      - kubelet.service=kubelet.service
      - kubelet-config.yaml=kubelet-config.yaml
      - kube-controller-manager.yaml=kube-controller-manager.yaml
      - kube-scheduler.yaml=kube-scheduler.yaml
      - kube-bench-sim.sh=kube-bench-sim.sh
      - val.sh=val.sh
generatorOptions:
  disableNameSuffixHash: true
