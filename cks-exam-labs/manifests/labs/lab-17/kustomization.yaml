apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cks-lab-17
resources:
  - namespace.yaml
  - ssh-authorized-key-secret.yaml
  - ssh-shell-base.yaml
  - common-rbac.yaml
  - ssh-pod.yaml
  - ssh-service.yaml
configMapGenerator:
  - name: cks-lab-17-task
    files:
      - task.txt=task-description.md
      - task-manifests.yaml=task-manifests.yaml
      - falco_rules.local.yaml=falco_rules.local.yaml
      - kubectl-sim.sh=kubectl-sim.sh
      - falco-sim.sh=falco-sim.sh
      - crictl-sim.sh=crictl-sim.sh
      - val.sh=val.sh
generatorOptions:
  disableNameSuffixHash: true
