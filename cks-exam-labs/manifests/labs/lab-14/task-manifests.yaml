apiVersion: v1
kind: Namespace
metadata:
  name: galaxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gamma
  namespace: galaxy
  labels:
    app: gamma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gamma
  template:
    metadata:
      labels:
        app: gamma
    spec:
      containers:
        - name: api
          image: busybox:1.36
          command:
            - sleep
            - "3600"
        - name: sidecar
          image: busybox:1.36
          command:
            - sleep
            - "3600"
