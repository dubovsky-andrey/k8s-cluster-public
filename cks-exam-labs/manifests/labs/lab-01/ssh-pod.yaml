apiVersion: apps/v1
kind: Deployment
metadata:
  name: cks-shell
  labels:
    app.kubernetes.io/name: cks-shell
    app.kubernetes.io/part-of: cks-lab-01
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cks-shell
      app.kubernetes.io/part-of: cks-lab-01
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cks-shell
        app.kubernetes.io/part-of: cks-lab-01
    spec:
      serviceAccountName: cks-shell
      automountServiceAccountToken: false
      initContainers:
        - name: bootstrap-task
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - kubectl apply -f /opt/cks/task-manifests.yaml
          env:
            - name: KUBECONFIG
              value: /home/student/.kube/config
          volumeMounts:
            - name: vcluster-kubeconfig
              mountPath: /home/student/.kube/config
              subPath: config
              readOnly: true
            - name: task
              mountPath: /opt/cks/task-manifests.yaml
              subPath: task-manifests.yaml
              readOnly: true
      containers:
        - name: ssh
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: ssh
              containerPort: 22
          env:
            - name: CKS_LAB_NAME
              value: cks-lab-01
            - name: KUBECONFIG
              value: /home/student/.kube/config
          command:
            - /bin/sh
            - -ec
            - |
              sleep infinity
          volumeMounts:
            - name: authorized-keys
              mountPath: /run/cks/authorized_keys
              subPath: authorized_keys
              readOnly: true
            - name: shell-base
              mountPath: /run/cks/bashrc
              subPath: bashrc
              readOnly: true
            - name: vcluster-kubeconfig
              mountPath: /home/student/.kube/config
              subPath: config
              readOnly: true
            - name: task
              mountPath: /home/student/task.md
              subPath: task.md
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: authorized-keys
          secret:
            secretName: cks-shared-ssh-authorized-keys
        - name: shell-base
          configMap:
            name: cks-shell-base
        - name: vcluster-kubeconfig
          secret:
            secretName: vc-lab-01
        - name: task
          configMap:
            name: cks-lab-01-task
