apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cks-lab-15
resources:
  - namespace.yaml
  - ssh-authorized-key-secret.yaml
  - ssh-shell-base.yaml
  - common-rbac.yaml
  - ssh-pod.yaml
  - ssh-service.yaml
configMapGenerator:
  - name: cks-lab-15-task
    files:
      - task.txt=task-description.md
      - task-manifests.yaml=task-manifests.yaml
      - kube-apiserver.yaml=kube-apiserver.yaml
      - cluster-policy.yaml=cluster-policy.yaml
      - kubectl-sim.sh=kubectl-sim.sh
      - val.sh=val.sh
generatorOptions:
  disableNameSuffixHash: true
