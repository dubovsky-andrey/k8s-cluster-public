apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cks-lab-02
resources:
  - namespace.yaml
  - apparmor-profile-loader.yaml
  - ssh-authorized-key-secret.yaml
  - ssh-shell-base.yaml
  - common-rbac.yaml
  - ssh-pod.yaml
  - ssh-service.yaml
configMapGenerator:
  - name: cks-lab-02-task
    files:
      - task.md=task-description.md
      - task-manifests.yaml=task-manifests.yaml
generatorOptions:
  disableNameSuffixHash: true
