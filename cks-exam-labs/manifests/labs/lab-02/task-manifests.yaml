apiVersion: v1
kind: Namespace
metadata:
  name: web
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: cilium
spec:
  controller: io.cilium/ingress-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cilium-operator
  namespace: kube-system
  labels:
    k8s-app: cilium-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: cilium-operator
  template:
    metadata:
      labels:
        k8s-app: cilium-operator
    spec:
      containers:
        - name: cilium-operator
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cilium
  namespace: kube-system
  labels:
    k8s-app: cilium
spec:
  selector:
    matchLabels:
      k8s-app: cilium
  template:
    metadata:
      labels:
        k8s-app: cilium
    spec:
      containers:
        - name: cilium-agent
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cilium-ingress-controller
  namespace: kube-system
  labels:
    k8s-app: cilium-ingress-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: cilium-ingress-controller
  template:
    metadata:
      labels:
        k8s-app: cilium-ingress-controller
    spec:
      containers:
        - name: cilium-ingress-controller
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-site-nginx
  namespace: web
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      location / {
        add_header Content-Type text/plain;
        return 200 "web-site: ready\n";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-site
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-site
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: web-site-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: web-site
  namespace: web
spec:
  selector:
    app.kubernetes.io/name: web-site
  ports:
    - name: http
      port: 80
      targetPort: 8080
