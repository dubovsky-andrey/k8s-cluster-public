apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cks-lab-12
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2223"
spec:
  project: cks-exam-labs
  source:
    repoURL: https://github.com/dubovsky-andrey/k8s-cluster-public.git
    path: cks-exam-labs/manifests/labs/lab-12
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: cks-lab-12
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
