apiVersion: v1
kind: Namespace
metadata:
  name: clever-cactus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clever-cactus-nginx
  namespace: clever-cactus
data:
  default.conf: |
    server {
        listen 8443 ssl;
        server_name web.k8s.local;

        ssl_certificate /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;

        location / {
            return 200 "clever-cactus\n";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clever-cactus
  namespace: clever-cactus
  labels:
    app: clever-cactus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clever-cactus
  template:
    metadata:
      labels:
        app: clever-cactus
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
          resources: {}
      volumes:
        - name: nginx-conf
          configMap:
            name: clever-cactus-nginx
        - name: tls
          secret:
            secretName: clever-cactus
---
apiVersion: v1
kind: Service
metadata:
  name: clever-cactus
  namespace: clever-cactus
spec:
  selector:
    app: clever-cactus
  ports:
    - name: https
      port: 443
      targetPort: https
