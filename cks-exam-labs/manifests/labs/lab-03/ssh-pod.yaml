apiVersion: apps/v1
kind: Deployment
metadata:
  name: cks-shell
  labels:
    app.kubernetes.io/name: cks-shell
    app.kubernetes.io/part-of: cks-lab-03
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cks-shell
      app.kubernetes.io/part-of: cks-lab-03
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cks-shell
        app.kubernetes.io/part-of: cks-lab-03
    spec:
      serviceAccountName: cks-shell
      automountServiceAccountToken: false
      initContainers:
        - name: bootstrap-task
          image: ghcr.io/dubovsky-andrey/cks-shell:v0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - kubectl apply -f /opt/cks/task-manifests.yaml
          env:
            - name: KUBECONFIG
              value: /home/student/.kube/config
          volumeMounts:
            - name: vcluster-kubeconfig
              mountPath: /home/student/.kube/config
              subPath: config
              readOnly: true
            - name: task
              mountPath: /opt/cks/task-manifests.yaml
              subPath: task-manifests.yaml
              readOnly: true
      containers:
        - name: ssh
          image: ghcr.io/dubovsky-andrey/cks-shell:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: ssh
              containerPort: 22
          env:
            - name: CKS_LAB_NAME
              value: cks-lab-03
            - name: KUBECONFIG
              value: /home/student/.kube/config
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              install -d -m 700 -o student -g student /home/student/.ssh /home/student/.kube
              cp /run/cks/authorized_keys /home/student/.ssh/authorized_keys
              cp /run/cks/bashrc /home/student/.bashrc
              chown -R student:student /home/student
              chmod 600 /home/student/.ssh/authorized_keys /home/student/.kube/config
              exec /usr/sbin/sshd -D -e
          volumeMounts:
            - name: authorized-keys
              mountPath: /run/cks/authorized_keys
              subPath: authorized_keys
              readOnly: true
            - name: shell-base
              mountPath: /run/cks/bashrc
              subPath: bashrc
              readOnly: true
            - name: vcluster-kubeconfig
              mountPath: /home/student/.kube/config
              subPath: config
              readOnly: true
            - name: task
              mountPath: /home/student/task.md
              subPath: task.md
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: authorized-keys
          secret:
            secretName: cks-shared-ssh-authorized-keys
        - name: shell-base
          configMap:
            name: cks-shell-base
        - name: vcluster-kubeconfig
          secret:
            secretName: vc-lab-03
        - name: task
          configMap:
            name: cks-lab-03-task
