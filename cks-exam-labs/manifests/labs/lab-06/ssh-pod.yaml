apiVersion: apps/v1
kind: Deployment
metadata:
  name: cks-shell
  labels:
    app.kubernetes.io/name: cks-shell
    app.kubernetes.io/part-of: cks-lab-06
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cks-shell
      app.kubernetes.io/part-of: cks-lab-06
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cks-shell
        app.kubernetes.io/part-of: cks-lab-06
    spec:
      serviceAccountName: cks-shell
      automountServiceAccountToken: false
      initContainers:
        - name: bootstrap-task
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - kubectl apply -f /opt/cks/task-manifests.yaml
          env:
            - name: KUBECONFIG
              value: /home/student/.kube/config
          volumeMounts:
            - name: vcluster-kubeconfig
              mountPath: /home/student/.kube/config
              subPath: config
              readOnly: true
            - name: task
              mountPath: /opt/cks/task-manifests.yaml
              subPath: task-manifests.yaml
              readOnly: true
      containers:
        - name: ssh
          image: ghcr.io/dubovsky-andrey/k8s-ubuntu:24.04
          imagePullPolicy: Always
          ports:
            - name: ssh
              containerPort: 22
          env:
            - name: CKS_LAB_NAME
              value: cks-lab-06
            - name: KUBECONFIG
              value: /home/student/.kube/config
          command:
            - /bin/sh
            - -ec
            - |
              install -d -m 700 -o student -g student /home/student/.ssh
              install -m 600 -o student -g student /run/cks/authorized_keys /home/student/.ssh/authorized_keys
              install -m 644 -o student -g student /run/cks/bashrc /home/student/.bashrc
              install -d -m 775 -o student -g student /var/lib/kubelet /etc/kubernetes/manifests /run/cks
              install -m 664 -o student -g student /run/cks/kubelet-config.yaml /var/lib/kubelet/config.yaml
              install -m 664 -o student -g student /run/cks/etcd.yaml /etc/kubernetes/manifests/etcd.yaml
              install -m 555 -o student -g student /run/cks/val.sh /home/student/val.sh
              install -m 555 -o root -g root /run/cks/systemctl-sim.sh /usr/local/bin/systemctl
              exec /usr/sbin/sshd -D -e
          volumeMounts:
            - name: authorized-keys
              mountPath: /run/cks/authorized_keys
              subPath: authorized_keys
              readOnly: true
            - name: shell-base
              mountPath: /run/cks/bashrc
              subPath: bashrc
              readOnly: true
            - name: vcluster-kubeconfig
              mountPath: /home/student/.kube/config
              subPath: config
              readOnly: true
            - name: task
              mountPath: /home/student/task.txt
              subPath: task.txt
              readOnly: true
            - name: task
              mountPath: /run/cks/kubelet-config.yaml
              subPath: kubelet-config.yaml
              readOnly: true
            - name: task
              mountPath: /run/cks/etcd.yaml
              subPath: etcd.yaml
              readOnly: true
            - name: task
              mountPath: /run/cks/systemctl-sim.sh
              subPath: systemctl-sim.sh
              readOnly: true
            - name: task
              mountPath: /run/cks/val.sh
              subPath: val.sh
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: authorized-keys
          secret:
            secretName: cks-shared-ssh-authorized-keys
        - name: shell-base
          configMap:
            name: cks-shell-base
        - name: vcluster-kubeconfig
          secret:
            secretName: vc-lab-06
        - name: task
          configMap:
            name: cks-lab-06-task
