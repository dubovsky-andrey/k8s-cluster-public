apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cks-lab-shells-root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2120"
spec:
  project: cks-exam-labs
  source:
    repoURL: https://github.com/dubovsky-andrey/k8s-cluster-public.git
    path: cks-exam-labs
    targetRevision: main
    directory:
      recurse: true
      include: "{manifests/labs/*/app.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
